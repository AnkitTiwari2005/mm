<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="theme-color" content="#FFF5FA" />
    <meta name="description" content="Marshmallow — Your cozy pocket companion, always here for you 🍬" />
    <title>Marshmallow ✨</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,500;6..12,600;6..12,700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    
    <!-- Material Symbols — LOCAL (offline-ready) -->
    <style>
      @font-face {
        font-family: 'Material Symbols Rounded';
        font-style: normal;
        font-weight: 100 700;
        font-display: block;
        src: url('/fonts/MaterialSymbolsRounded.woff2') format('woff2');
      }
      .material-symbols-rounded {
        font-family: 'Material Symbols Rounded';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        font-feature-settings: 'liga';
      }
    </style>
    
    <style>
      :root {
        --primary: #E879A2;
        --bg: #FFF5FA;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg);
        -webkit-tap-highlight-color: transparent;
      }
      * {
        -webkit-user-select: none;
        user-select: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      input, textarea {
        -webkit-user-select: text;
        user-select: text;
      }
      /* Allow document to grow */
      html, body {
        min-height: 100%;
      }
      #root {
        min-height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
